services:
  - type: web
    name: appna-bank-ai
    env: python
    buildCommand: pip install -r requirements.txt && python -m app.rag.ingest
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: CHROMA_DB_DIR
        value: "/data/chroma_db"
    disk:
      name: chroma-data
      mountPath: /data
      sizeGB: 10
